<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microcredencial: Git y Metodologías Ágiles</title>
  <style>
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f6fbf7;
      color: #222;
      margin: 0;
      padding: 0;
    }
    header {
      background: linear-gradient(90deg, #22543d 60%, #38b2ac 100%);
      color: #fff;
      padding: 2.5rem 1rem 1.5rem 1rem;
      text-align: center;
      box-shadow: 0 2px 12px #22543d33;
      border-radius: 0 0 18px 18px;
      position: relative;
      overflow: hidden;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 0.3em;
      text-shadow: 0 2px 8px #22543d44;
    }
    header .subtitulo {
      font-size: 1.1rem;
      font-weight: 400;
      margin-bottom: 0.2em;
      color: #e6fffa;
      letter-spacing: 0.5px;
    }
    main {
      max-width: 700px;
      margin: 2rem auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 16px #22543d22;
      padding: 2rem;
    }
    .temas-grid {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    .tema-card {
      background: #e6fffa;
      border-radius: 12px;
      box-shadow: 0 2px 8px #22543d22;
      padding: 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.7em;
      border-left: 6px solid #38b2ac;
    }
    .tema-card .tema {
      font-size: 1.18em;
      color: #22543d;
      font-weight: bold;
    }
    .tema-card .enlaces {
      display: flex;
      gap: 1.2em;
      align-items: center;
    }
    a {
      color: #22543d;
      text-decoration: none;
      font-weight: 500;
    }
    a:hover {
      color: #38b2ac;
      text-decoration: underline;
    }
    footer {
      text-align: center;
      color: #38b2ac;
      font-size: 0.95em;
      margin: 2rem 0 1rem 0;
    }
  </style>
</head>
<body>
  <header>
    <h1>Microcredencial: Git y Metodologías Ágiles</h1>
    <div class="subtitulo">Universidad de Cantabria</div>
  </header>
  <main>
    <section>
      <div class="temas-grid">
        <div class="tema-card">
          <div class="tema">CI/CD con GitHub Actions</div>
          <div class="enlaces">
            <a href="cicd-github-actions/" target="_blank">🌐 Ver presentación</a>
            <span style="color: #22543d">|</span>
            <a href="cicd-github-actions/cicd-github-actions.pdf" target="_blank">📄 Descargar PDF</a>
          </div>
        </div>
      </div>
    </section>
  </main>
  <footer>
    &copy; 2026 Juan M Rivas (rivasjm@unican.es)
  </footer>
</body>
</html>

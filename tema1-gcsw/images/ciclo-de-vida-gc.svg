<svg width="480" height="400" viewBox="0 0 480 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .node { font: bold 16px sans-serif; fill: #1a202c; }
      .edge { stroke: #3182ce; stroke-width:2; marker-end: url(#arrow); }
      .rect-node { fill: #ebf8ff; stroke: #3182ce; stroke-width:2; }
      .rect-node-hightlight { fill: #fff0eb; stroke: #3182ce; stroke-width:2; }
      .rect-node-central { fill: #f6e05e; stroke: #b7791f; stroke-width:2; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3182ce"/>
    </marker>
  </defs>
  <g>
    <rect class="rect-node" x="180" y="30" width="120" height="60" rx="10" ry="10"/>
    <text class="node" x="240" y="65" text-anchor="middle">Requisitos</text>
  </g>
  <g>
    <rect class="rect-node" x="330" y="120" width="120" height="60" rx="10" ry="10"/>
    <text class="node" x="390" y="155" text-anchor="middle">Diseño</text>
  </g>
  <g>
    <rect class="rect-node" x="320" y="240" width="140" height="60" rx="10" ry="10"/>
    <text class="node" x="390" y="275" text-anchor="middle">Implementación</text>
  </g>
  <g>
    <rect class="rect-node" x="180" y="330" width="120" height="60" rx="10" ry="10"/>
    <text class="node" x="240" y="365" text-anchor="middle">Pruebas</text>
  </g>
  <g>
    <rect class="rect-node" x="30" y="240" width="120" height="60" rx="10" ry="10"/>
    <text class="node" x="90" y="275" text-anchor="middle">Despliegue</text>
  </g>
  <g>
    <rect class="rect-node" x="30" y="120" width="120" height="60" rx="10" ry="10"/>
    <text class="node" x="90" y="155" text-anchor="middle">Mantenimiento</text>
  </g>
  <g>
    <rect class="rect-node-central" x="170" y="170" width="140" height="70" rx="18" ry="18"/>
    <text class="node" x="240" y="200" text-anchor="middle">Gestión de la</text>
    <text class="node" x="240" y="222" text-anchor="middle">Configuración</text>
  </g>

  <line class="edge" x1="300" y1="96" x2="330" y2="114"/>
  <line class="edge" x1="390" y1="180" x2="390" y2="240"/>
  <line class="edge" x1="330" y1="306" x2="300" y2="324"/>
  <line class="edge" x1="180" y1="324" x2="150" y2="306"/>
  <line class="edge" x1="90" y1="240" x2="90" y2="180"/>
  <line class="edge" x1="150" y1="114" x2="180" y2="96"/>

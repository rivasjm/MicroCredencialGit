<svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .rect {
                fill: white;
                stroke: black;
                stroke-width: 2;
            }
            .text {
                font-family: sans-serif;
                font-size: 20px;
                text-anchor: middle;
                dominant-baseline: central;
            }
            .arrow {
                stroke: black;
                stroke-width: 2;
                fill: none;
                marker-end: url(#arrowhead);
            }
            .arrow-both {
                stroke: black;
                stroke-width: 2;
                fill: none;
                marker-end: url(#arrowhead);
                marker-start: url(#arrowhead);
            }
            #arrowhead {
                markerUnits: strokeWidth;
                refX: 0; refY: 5;
                markerWidth: 10; markerHeight: 10;
                orient: auto;
            }
            #arrowhead polygon {
                fill: black;
                stroke: black;
            }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
            <polygon points="0 0, 10 5, 0 10" />
        </marker>
    </defs>

    <rect x="100" y="50" width="200" height="60" class="rect"/>
    <text x="200" y="70" class="text">Dictador</text>
    <text x="200" y="90" class="text">(Privado)</text>

    <rect x="450" y="50" width="250" height="60" class="rect"/>
    <text x="575" y="70" class="text">Repositorio Central</text>
    <text x="575" y="90" class="text">(Público)</text>

    <rect x="100" y="200" width="150" height="60" class="rect"/>
    <text x="175" y="230" class="text">Teniente</text>

    <rect x="450" y="200" width="150" height="60" class="rect"/>
    <text x="525" y="230" class="text">Teniente</text>

    <rect x="25" y="350" width="150" height="60" class="rect"/>
    <text x="100" y="380" class="text">Desarrollador</text>

    <rect x="200" y="350" width="150" height="60" class="rect"/>
    <text x="275" y="380" class="text">Desarrollador</text>

    <rect x="375" y="350" width="150" height="60" class="rect"/>
    <text x="450" y="380" class="text">Desarrollador</text>

    <rect x="550" y="350" width="150" height="60" class="rect"/>
    <text x="625" y="380" class="text">Desarrollador</text>

    <!-- Flecha del Dictador al Repositorio Central -->
    <line x1="300" y1="80" x2="450" y2="80" class="arrow"/>

    <!-- Flecha del Teniente izquierdo al Dictador -->
    <line x1="175" y1="200" x2="200" y2="110" class="arrow"/>

    <!-- Flecha del Teniente derecho al Dictador -->
    <line x1="525" y1="200" x2="275" y2="110" class="arrow"/>

    <!-- Flechas de los desarrolladores a sus tenientes -->
    <line x1="100" y1="350" x2="155" y2="260" class="arrow"/>
    <line x1="275" y1="350" x2="195" y2="260" class="arrow"/>
    <line x1="450" y1="350" x2="505" y2="260" class="arrow"/>
    <line x1="625" y1="350" x2="545" y2="260" class="arrow"/>

</svg>